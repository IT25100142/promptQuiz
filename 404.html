<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PromptQuiz</title>
    <!--
      GitHub Pages SPA fallback — redirect deep links back to index.html.
      See: https://github.com/rafgraph/spa-github-pages
      pathSegmentsToKeep = 1 for https://<user>.github.io/promptQuiz/
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var location = window.location;
      location.replace(
        location.protocol +
          '//' +
          location.hostname +
          (location.port ? ':' + location.port : '') +
          location.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          location.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (location.search
            ? '&' + location.search.slice(1).replace(/&/g, '~and~')
            : '') +
          location.hash
      );
    </script>
  </head>
  <body></body>
</html>
